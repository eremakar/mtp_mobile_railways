name: passflow_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.2+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  localization: ^2.1.1
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7
  table_calendar: ^3.0.8 
  dotted_line: ^3.0.0
  http: ^0.13.3
  dio: ^4.0.6
  local_auth: ^2.3.0
  url_launcher: ^6.0.10
  jwt_decode: ^0.3.0
  provider: ^6.0.0
  shared_preferences: ^2.0.7
  hive: ^2.0.5
  hive_flutter: ^1.1.0
  path_provider: ^2.0.2
  get_it: ^7.1.0
  image_picker: ^0.8.2
  flutter_bloc: ^7.3.3
  connectivity_plus: ^6.1.4
  logger: ^1.1.0
  collection: ^1.15.0
  month_picker_dialog: ^0.4.0
  equatable: ^2.0.3
  mask_text_input_formatter: ^2.9.0
  package_info_plus: ^8.3.0
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0
  pdf: ^3.11.3
  printing: ^5.14.2
  permission_handler: ^12.0.1
  device_info_plus: ^11.3.0
  sunmi_printer_plus: ^4.1.1
  barcode_image: ^2.0.3
  
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  change_app_package_name: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/images/profile/
    - assets/svg_icons/
    - assets/json/
    - lib/l10n/

  fonts:
    - family: SF Pro Text
      fonts:
        - asset: assets/fonts/SFProTextBold.ttf
          weight: 700
        - asset: assets/fonts/SFProTextBoldItalic.ttf
          weight: 700
    - family: Montserrat
      fonts:
        - asset: assets/fonts/MontserratRomanBold.ttf
          weight: 700
        - asset: assets/fonts/MontserratRegular.ttf
          weight: 400
    - family: Roboto
      fonts:
        - asset: assets/fonts/RobotoRomanMedium.ttf
          weight: 500
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFProDisplayMedium.ttf
          weight: 500

  generate: true