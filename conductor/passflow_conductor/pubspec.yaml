name: passflow_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.6.2 <4.0.0"


dependencies:
  flutter:
    sdk: flutter

  # Локализация из SDK
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.7
  table_calendar: ^3.1.3
  dotted_line: ^3.2.3
  http: ^1.3.0
  dio: ^5.8.0+1
  flame_splash_screen: ^0.3.1+2
  local_auth: ^2.3.0
  url_launcher: ^6.1.9
  jwt_decode: ^0.3.1
  provider: ^6.1.2
  shared_preferences: ^2.5.2
  talker: ^4.7.1
  live_activities: ^2.3.1
  flutter_foreground_task: ^8.8.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  open_filex: ^4.7.0
  get_it: ^8.0.3
  flutter_app_group_directory: ^1.1.0
  image_picker: ^1.1.2
  flutter_bloc: ^9.1.0
  hive_generator: ^2.0.1
  connectivity_plus: ^5.0.2
  logger: ^2.5.0
  collection: ^1.19.0
  month_picker_dialog: ^6.0.3
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.0
  cloud_firestore: ^5.6.8
  flutter_local_notifications: ^18.0.1
  equatable: ^2.0.7
  package_info_plus: ^8.1.2
  local_auth_android: ^1.0.51
  android_intent_plus: ^5.3.1
  localization: ^2.1.1
  webview_flutter: ^4.13.0
  syncfusion_flutter_pdfviewer: ^31.1.21
  meta: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.6
  
flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/icons/
    # - assets/icons_svg/
    # - assets/icons_svg/settings/
    - assets/images/
    - assets/images/profile/
    - assets/svg_icons/
    # - assets/icons_svg/upload_files_icons/
    # - assets/icons_svg/notification_group/
    - assets/json/
    - lib/i18n/
    

  fonts:
    - family: SF Pro Text
      fonts:
        - asset: assets/fonts/SFProTextBold.ttf
          weight: 700
        - asset: assets/fonts/SFProTextBoldItalic.ttf
          weight: 700
    - family: Montserrat
      fonts:
        - asset: assets/fonts/MontserratRomanBold.ttf
          weight: 700
        - asset: assets/fonts/MontserratRegular.ttf
          weight: 400
    - family: Roboto
      fonts:
        - asset: assets/fonts/RobotoRomanMedium.ttf
          weight: 500
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFProDisplayMedium.ttf
          weight: 500

dependency_overrides:
  flutter_foreground_task: 8.8.0
